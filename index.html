<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beehome Login</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#1c1c1f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
}

.container{
    width:360px;
    padding:60px 25px;
}

.logo{
    display:flex;
    flex-direction:row; /* mesma linha */
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:60px;
}

.logo img{
    height:50px;
}

.logo-text{
    font-size:42px;
    font-weight:600;
    color:#e6e6e6;
    letter-spacing:1px;
}

.label{
    font-size:12px;
    color:#9aa0a6;
    letter-spacing:1px;
    margin-bottom:10px;
}

.input-box{
    background:#2a2a2e;
    border-radius:10px;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
}

.input-box input{
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    width:70%;
}

.domain{
    color:#bdbdbd;
    font-size:14px;
}

.helper{
    color:#9aa0a6;
    font-size:12px;
    line-height:1.4;
    margin-bottom:30px;
}

.button{
    width:100%;
    background:#3d6fb6;
    border:none;
    padding:16px;
    border-radius:12px;
    font-weight:600;
    letter-spacing:1px;
    color:white;
    cursor:pointer;
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:12px;
    color:#9aa0a6;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-beehome.png" alt="Beehome">
<div class="logo-text">beehome</div>
</div>

<div class="label">SEU ENDEREÇO DE ACESSO</div>

<div class="input-box">
<input type="text" placeholder="Digite o endereço...">
<div class="domain">.mybeehome.com</div>
</div>

<div class="helper">
Digite o nome do seu domínio, sem o .mybeehome.com. Não digite aqui o seu email ou chave de acesso, essa informação será solicitada na próxima tela
</div>

<button class="button">PRÓXIMO</button>

</div>

<div class="footer">
© 2026 Beehome. Todos os direitos reservados
</div>

</body>
</html>
